# YASB Configuration — generated by dotfiles-installer
# Full widget reference: https://github.com/amnweb/yasb/wiki
watch_stylesheet: true
watch_config: true
debug: false
update_check: true
komorebi:
  start_command: "komorebic start --masir"
  stop_command: "komorebic stop --masir"
  reload_command: "komorebic stop --masir && komorebic start --masir"
bars:
  primary-bar:
    enabled: true
    screens: ["*"]
    class_name: "yasb-bar"
    alignment:
      position: "{{BAR_POSITION}}"
      center: false
    animation:
      enabled: true
      duration: 400
    blur_effect:
      enabled: false
      acrylic: false
      dark_mode: false
      round_corners: false
      round_corners_type: "normal"
      border_color: "system"
    window_flags:
      always_on_top: false
      windows_app_bar: true
    dimensions:
      width: "100%"
      height: {{BAR_HEIGHT}}
    padding:
      top: 0
      left: 0
      bottom: 0
      right: 0
    widgets:
      left:
      - "home"
      - "system_control"
      - "media_cava"
      - "systray"
      center:
      - "komorebi_workspaces"
      - "komorebi_active_layout"
      right:
      - "notifications"
      - "weather"
      - "clock"
      - "hwinfo"
      - "power_menu"
widgets:
  home:
    type: "yasb.home.HomeWidget"
    options:
      label: ""
      menu_list:
      - { title: "User Home",  path: "~" }
      - { title: "Downloads",  path: "~\\Downloads" }
      - { title: "Documents",  path: "~\\Documents" }
      - { title: "Pictures",   path: "~\\Pictures" }
      system_menu: true
      power_menu: true
      blur: true

  media:
    type: "yasb.media.MediaWidget"
    options:
      label: "{title} "
      label_alt: "{artist}"
      callbacks:
        on_left: "toggle_media_menu"
        on_middle: "toggle_play_pause"
        on_right: "toggle_label"
      max_field_size:
        label: 25
        label_alt: 15
      hide_empty: true
      show_thumbnail: true
      scrolling_label:
        enabled: true
        update_interval_ms: 33
        ease_slope: 40
        ease_pos: 0.8
        ease_min: 0.5
      controls_left: true
      media_menu:
        blur: true
        round_corners: false
        round_corners_type: "normal"
        border_color: "system"
        alignment: "center"
        direction: "down"
        offset_top: true
        thumbnail_corner_radius: 6
        thumbnail_size: 80
        max_title_size: 40
        max_artist_size: 20
        show_source: true
      thumbnail_edge_fade: true
      icons:
        play: ""
        pause: ""
        prev_track: ""
        next_track: ""
    container_padding:
      top: 0
      left: 0
      bottom: 0
      right: 0
    label_shadow:
      enabled: true
      color: "black"
      radius: 5
      offset: [0, 0]

  komorebi_workspaces:
    type: "komorebi.workspaces.WorkspaceWidget"
    options:
      label_workspace_btn: "{index}"
      label_workspace_active_btn: "{index}"
      label_workspace_populated_btn: "{index}"
      label_default_name: "{index}"
      label_zero_index: false
      hide_empty_workspaces: true
      hide_if_offline: true
      animation: false
      app_icons:
        enabled_populated: true
        enabled_active: true
        size: 20
        max_icons: 3
        hide_label: false
        hide_duplicates: true
        hide_floating: false

  komorebi_active_layout:
    type: "komorebi.active_layout.ActiveLayoutWidget"
    options:
      hide_if_offline: true
      label: "{icon}"
      layouts:
        - "bsp"
        - "columns"
        - "rows"
        - "grid"
        - "scrolling"
        - "vertical_stack"
        - "horizontal_stack"
        - "ultrawide_vertical_stack"
        - "right_main_vertical_stack"
      layout_icons:
        bsp: ""
        columns: ""
        rows: ""
        grid: "󰝘"
        scrolling: ""
        vertical_stack: ""
        horizontal_stack: ""
        ultrawide_vertical_stack: ""
        right_main_vertical_stack: ""
        monocle: ""
        maximized: ""
        floating: ""
        paused: "󰾉"
        tiling: "󰙀"
      callbacks:
        on_left: "toggle_layout_menu"
        on_middle: "toggle_tiling"
        on_right: "next_layout"
      layout_menu:
        blur: true
        round_corners: false
        alignment: "left"
        direction: "down"
        offset_top: true
        show_layout_icons: true
      container_padding:
        top: 0
        left: 0
        bottom: 0
        right: 0
      label_shadow:
        enabled: true
        color: "black"
        radius: 5
        offset: [0, 0]

  power_menu:
    type: "yasb.power_menu.PowerMenuWidget"
    options:
      label: ""
      uptime: True
      blur: False
      blur_background: True
      animation_duration: 200
      button_row: 5
      buttons:
        shutdown:  ["", "Shut Down"]
        restart:   ["", "Restart"]
        signout:   ["󰍃", "Sign out"]
        hibernate: ["", "Hibernate"]
        sleep:     ["⏾", "Sleep"]
        cancel:    ["", "Cancel"]

  notifications:
    type: "yasb.notifications.NotificationsWidget"
    options:
      label: "<span></span> {count}"
      label_alt: "{count} notifications"
      hide_empty: true
      tooltip: false
      callbacks:
        on_left: "toggle_notification"
        on_right: "do_nothing"
        on_middle: "toggle_label"

  battery:
    type: "yasb.battery.BatteryWidget"
    options:
      label: "<span>{icon}</span> {percent}%"
      label_alt: "<span>{icon}</span> {percent}% | time: {time_remaining}"
      update_interval: 5000
      time_remaining_natural: False
      hide_unsupported: True
      charging_options:
        icon_format: "{charging_icon}"
        blink_charging_icon: true
        blink_interval: 500
      status_thresholds:
        critical: 10
        low: 25
        medium: 75
        high: 95
        full: 100
      status_icons:
        icon_charging: ""
        icon_critical: ""
        icon_low: ""
        icon_medium: ""
        icon_high: ""
        icon_full: ""

  systray:
    type: "yasb.systray.SystrayWidget"
    options:
      class_name: "systray"
      label_collapsed: "󰍟"
      label_expanded: "󰍞"
      label_position: "left"
      icon_size: 15
      pin_click_modifier: "alt"
      show_unpinned: false
      show_unpinned_button: true
      show_battery: false
      show_volume: false
      show_network: false

  memory:
    type: "yasb.memory.MemoryWidget"
    options:
      label: ""
      label_alt: "VIRT: {virtual_mem_percent}% SWAP: {swap_mem_percent}%"
      update_interval: 5000
      progress_bar:
        enabled: true
        size: 14
        thickness: 2
        color: "{{BORDER_COLOR_SINGLE}}"
        background_color: "{{STACKBAR_BG}}"
      callbacks:
        on_left: "toggle_label"
      memory_thresholds:
        low: 25
        medium: 50
        high: 90

  cpu:
    type: "yasb.cpu.CpuWidget"
    options:
      label: ""
      label_alt: "CPU {info[percent][total]:.0f}%"
      progress_bar:
        enabled: true
        position: "left"
        size: 14
        thickness: 2
        color: "{{BORDER_COLOR_SINGLE}}"
        background_color: "{{STACKBAR_BG}}"
      update_interval: 2000
      callbacks:
        on_right: "do_nothing"

  gpu:
    type: "yasb.gpu.GpuWidget"
    options:
      label: ""
      label_alt: "GPU {info[temp]}°C | {info[mem_used]} / {info[mem_total]}"
      update_interval: 2000
      progress_bar:
        enabled: true
        size: 14
        thickness: 2
        color: "{{BORDER_COLOR_SINGLE}}"
        background_color: "{{STACKBAR_BG}}"
      gpu_thresholds:
        low: 25
        medium: 50
        high: 90

  disk:
    type: "yasb.disk.DiskWidget"
    options:
      label: "<span></span>"
      label_alt: "{volume_label}:{space[used][percent]}"
      volume_label: "C"
      update_interval: 60
      group_label:
        volume_labels: ["C", "D"]
        show_label_name: true
        blur: True
        round_corners: true
        round_corners_type: "normal"
        border_color: "System"
        alignment: "right"
        direction: "down"
        offset_top: 6
        offset_left: 120
      callbacks:
        on_left: "toggle_group"
        on_right: "toggle_label"
      label_shadow:
        enabled: true
        color: "black"
        radius: 6
        offset: [1, 1]

  hwinfo:
    type: "yasb.grouper.GrouperWidget"
    options:
      class_name: "hwinfo"
      widgets: ["disk", "cpu", "memory", "gpu"]
      container_padding:
        top: 0
        left: 4
        bottom: 0
        right: 4

  clock:
    type: "yasb.clock.ClockWidget"
    options:
      label: " {%H:%M}"
      label_alt: " {%A, %B %d. %Y %H:%M}"
      locale: ""
      timezones: {{YASB_CLOCK_TIMEZONES}}
      calendar:
        round_corners: true
        round_corners_type: "small"
        border_color: "{{BORDER_COLOR_SINGLE}}"
        alignment: "center"
        offset_top: 0

  weather:
    type: "yasb.weather.WeatherWidget"
    options:
      label: "<span>{icon}</span> {temp}"
      label_alt: "{location}: {conditions}, Min {min_temp}, Max {max_temp}, Humidity {humidity}"
      # Get a free API key at https://www.weatherapi.com (free tier is sufficient)
      api_key: "{{WEATHER_API_KEY}}"
      update_interval: 600
      hide_decimal: true
      location: "{{WEATHER_LOCATION}}"
      units: "metric"
      callbacks:
        on_left: "toggle_card"
      icons:
        sunnyDay: "󰖙"
        clearNight: ""
        cloudyDay: ""
        cloudyNight: ""
        rainyDay: ""
        rainyNight: ""
        blizzardDay: "󰖙"
        default: "󰖙"
      weather_card:
        blur: true
        round_corners: true
        round_corners_type: "small"
        border_color: "{{BORDER_COLOR_SINGLE}}"
        alignment: "center"
        direction: "down"
        offset_top: 0
        icon_size: 48

  wifi:
    type: "yasb.wifi.WifiWidget"
    options:
      label: "<span>{wifi_icon}</span> {wifi_strength}%"
      label_alt: "<span>{wifi_icon}</span> {wifi_name} {wifi_strength}%"
      ethernet_label: "<span>{wifi_icon}</span>"
      ethernet_label_alt: "<span>{wifi_icon}</span> {wifi_name}"
      ethernet_icon: ""
      update_interval: 5000
      callbacks:
        on_left: "toggle_menu"
        on_middle: "exec cmd.exe /c start ms-settings:network"
        on_right: "toggle_label"
      wifi_icons:
        - "󰤮"
        - "󰤟"
        - "󰤢"
        - "󰤥"
        - "󰤨"
      menu_config:
        blur: true
        round_corners: true
        round_corners_type: "small"
        border_color: "System"
        alignment: "center"
        direction: "down"
        offset_top: 0
        offset_left: 0

  volume:
    type: "yasb.volume.VolumeWidget"
    options:
      label: "<span>{icon}</span> {level}"
      label_alt: "{volume}"
      volume_icons:
        - ""
        - ""
        - ""
        - ""
        - ""
      audio_menu:
        blur: true
        round_corners: true
        round_corners_type: "small"
        border_color: "System"
        alignment: "center"
        direction: "down"
        offset_top: 0
      callbacks:
        on_right: "toggle_mute"

  bluetooth:
    type: "yasb.bluetooth.BluetoothWidget"
    options:
      label: "{icon}"
      label_alt: "{device_name}"
      icons:
        bluetooth_on: "󰂯"
        bluetooth_off: "󰂲"
        bluetooth_connected: "󰂱"
      callbacks:
        on_right: "exec cmd.exe /c start ms-settings:bluetooth"

  microphone:
    type: "yasb.microphone.MicrophoneWidget"
    options:
      label: "<span>{icon}</span>"
      label_alt: "<span>{icon}</span> {level}"
      mute_text: "mute"
      icons:
        normal: ""
        muted: ""
      mic_menu:
        blur: true
        round_corners: true
        round_corners_type: "normal"
        border_color: "system"
        alignment: "right"
        direction: "down"
      callbacks:
        on_left: "toggle_mic_menu"
        on_middle: "toggle_label"
        on_right: "toggle_mute"

  cava:
    type: "yasb.cava.CavaWidget"
    options:
      bar_height: 28
      min_bar_height: 1
      bar_type: "bars_mirrored"
      gradient: 1
      reverse: 0
      foreground: "{{BORDER_COLOR_SINGLE}}"
      gradient_color_1: "{{BORDER_COLOR_STACK}}"
      gradient_color_2: "{{BORDER_COLOR_STACK}}"
      gradient_color_3: "{{BORDER_COLOR_STACK}}"
      bars_number: 16
      bar_spacing: 1
      bar_width: 2
      sleep_timer: 2
      hide_empty: true
      container_padding:
        top: 2
        left: 8
        bottom: 0
        right: 8

  system_control:
    type: "yasb.grouper.GrouperWidget"
    options:
      class_name: "system_control"
      widgets: [battery, volume, microphone, wifi, bluetooth]
      container_padding:
        top: 0
        left: 2
        bottom: 0
        right: 2

  media_cava:
    type: "yasb.grouper.GrouperWidget"
    options:
      class_name: "media_cava"
      widgets: ["media", "cava"]
      container_padding:
        top: 0
        left: 0
        bottom: 0
        right: 0
